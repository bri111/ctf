<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechCorp — Employee Login</title>
  <!-- TODO: remove before deployment — admin backdoor: CTF{h1dd3n_1n_pl41n_s1ght} -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 380px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: #1a56db;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px;
    }

    .logo-text { font-size: 20px; font-weight: 600; color: #111; }

    h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 5px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 14px;
      font-family: inherit;
      color: #111;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #1a56db; }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .remember-row label { margin: 0; display: flex; align-items: center; gap: 7px; font-weight: 400; }

    .forgot { font-size: 13px; color: #1a56db; text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-login:hover { background: #1647b8; }

    .divider {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin: 18px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 42%;
      height: 1px; background: #e5e7eb;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .sso-btn {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: #374151;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    .sso-btn:hover { background: #f9fafb; }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 13px;
      color: #b91c1c;
      margin-bottom: 16px;
      display: none;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 22px;
    }

    /* hidden field the lazy dev left in */
    .debug-info { display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">TechCorp</div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your employee account</p>

    <div class="error-box" id="error-box">Invalid username or password.</div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="john.doe@techcorp.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" />

    <!-- debug: default admin creds username=admin password=admin123 -->
    <div class="debug-info" id="debug">
      <span data-user="admin" data-pass="admin123" data-note="remove in prod"></span>
    </div>

    <div class="remember-row">
      <label><input type="checkbox" /> Remember me</label>
      <a class="forgot" href="#">Forgot password?</a>
    </div>

    <button class="btn-login" onclick="tryLogin()">Sign in</button>

    <div class="divider">or</div>

    <button class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
      Continue with Google SSO
    </button>

    <p class="footer-note">© 2024 TechCorp Internal Portal · <a href="#" style="color:#9ca3af">Privacy Policy</a></p>
  </div>

  <script>
    // NOTE: this entire auth block should be server-side eventually
    const VALID_USERS = {
      // format: username: hashedPassword
      // TODO: actually hash these before shipping lol
      "admin":      "admin123",
      "j.smith":    "Welcome1!",
      "a.nguyen":   "TechCorp2024",
    };

    function tryLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const errBox = document.getElementById('error-box');

      if (VALID_USERS[u] && VALID_USERS[u] === p) {
        document.body.innerHTML = `
          <div style="font-family:Inter,sans-serif;text-align:center;padding:60px 20px;">
            <div style="font-size:48px;margin-bottom:16px;">🎉</div>
            <h2 style="color:#111;margin-bottom:8px;">Logged in as ${u}</h2>
            <p style="color:#6b7280;font-size:14px;">You found the credentials hidden in the source code.</p>
            <p style="margin-top:20px;font-family:monospace;font-size:16px;background:#f0fdf4;border:1px solid #86efac;padding:12px 24px;border-radius:8px;display:inline-block;color:#166534;">
              CTF{h1dd3n_1n_pl41n_s1ght}
            </p>
          </div>`;
      } else {
        errBox.style.display = 'block';
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });
  </script>
</body>
</html>
